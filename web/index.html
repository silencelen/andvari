<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <!-- Self-contained brand favicon (the ᛅ sigil) + per-scheme chrome tint. Same-origin assets,
         so the strict self-only CSP is satisfied; no external requests. -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#14120e" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f4efe4" media="(prefers-color-scheme: light)" />
    <meta name="description" content="andvari — your household's zero-knowledge password manager." />
    <title>andvari</title>
    <!-- Cut M (v2 #22): pre-hydration shell. Inline <style> is fine under the server CSP
         (style-src allows 'unsafe-inline'; script-src does NOT — so no inline JS here).
         These are literal twins of styles.css --bg/--ink-dim/--serif: this file paints
         frames before the bundle (and its tokens) arrives, so the values are inlined. -->
    <style>
      html { background: #14120e; }
      .boot { display: flex; min-height: 100vh; min-height: 100dvh; align-items: center; justify-content: center; color: #a79c85; font: 15px/1.4 "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif; letter-spacing: 0.04em; }
      @media (prefers-color-scheme: light) {
        html { background: #f4efe4; }
        .boot { color: #6b6047; }
      }
    </style>
    <!-- Forced-theme cold-load FOUC fix: a same-origin, classic (render-blocking) script that
         stamps <html data-theme> from the persisted preference BEFORE first paint. Inline JS is
         barred by the CSP (script-src 'self', not 'unsafe-inline'), so it lives in /public and is
         a faithful twin of applyThemePref/readThemePref in src/ui/useTheme.ts (initTheme re-runs
         the same logic on mount). Must stay classic + before the module bundle so it runs pre-paint. -->
    <script src="/theme-boot.js"></script>
  </head>
  <body>
    <!-- No JS = no crypto, no app — say so instead of a permanent blank page. -->
    <noscript>
      <div class="boot">andvari needs JavaScript to unseal your hoard — enable it, then reload.</div>
    </noscript>
    <div id="root">
      <!-- Boot placeholder over the blank first paint; createRoot clears the container,
           so React's first render sweeps this away. Copy mirrors App's loading phase. -->
      <div class="boot">unsealing…</div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
