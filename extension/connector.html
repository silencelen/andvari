<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>andvari — quick unlock</title>
    <!-- Themed with the popup's treasury stylesheet; only inline STYLE is allowed under the
         extension-pages CSP (script-src 'self'), so the logic loads from connector.js. -->
    <link rel="stylesheet" href="popup.css" />
    <style>
      body {
        width: auto;
        min-width: 280px;
        padding: 22px 20px;
      }
      .cx {
        display: flex;
        flex-direction: column;
        gap: 14px;
        text-align: center;
        align-items: stretch;
        /* The window is deliberately ROOMY (600×760 — Chrome draws its passkey chooser inside it and
           clips in a slim popup); keep our own column narrow and centered so it still reads as a card. */
        max-width: 340px;
        margin: 24px auto 0;
      }
      .cx h1 {
        font-size: 16px;
        margin: 0;
        font-family: var(--serif);
        color: var(--gold-text);
      }
      .cx p {
        margin: 0;
        font-size: 13px;
        line-height: 1.45;
      }
      #cx-msg {
        min-height: 20px;
      }
      #cx-msg.err {
        color: var(--danger);
      }
      #cx-msg.ok {
        color: var(--ok);
      }
      .cx-hint {
        color: var(--ink-faint);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main class="cx">
      <h1 id="cx-title">Quick unlock</h1>
      <p id="cx-msg" role="status" aria-live="polite">Preparing…</p>
      <button id="cx-continue" class="primary" hidden>Continue</button>
      <p class="cx-hint" id="cx-hint" hidden>Your device will ask for Windows Hello, Touch ID, or your device PIN.</p>
      <button id="cx-close" class="link dim" hidden>Close</button>
    </main>
    <script type="module" src="connector.js"></script>
  </body>
</html>
