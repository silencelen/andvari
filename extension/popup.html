<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>andvari</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="pop-head">
      <span class="brand"><span class="sigil-sm">ᛅ</span><span class="a-mark">and</span>vari</span>
      <span id="conn" class="dot off" title="server"></span>
    </header>

    <!-- Self-update signal (both views). Shown only when a strictly-newer build is published;
         unpacked extensions can't self-install, so this points to the download + a reload. -->
    <div id="update" class="update-banner" hidden>
      <span id="update-text"></span>
      <a id="update-link" class="update-link" target="_blank" rel="noopener noreferrer" hidden></a>
    </div>

    <!-- E1-6 recovery-password nudge: a rescued member re-logged in with the admin-known
         temporary password. Persistent + non-dismissable for the whole unlocked session (the
         mustChange banner idiom, not the dismissable-notice one); shown only when unlocked AND
         the login response carried mustChangePassword. The extension can't change the password
         itself, so the whole strip is a button to the web vault. Cleared only by a fresh unlock
         whose response no longer carries the flag. -->
    <button id="must-change" class="must-change-strip" type="button" hidden>
      Recovery sign-in — set a new master password in the web vault.
    </button>

    <section id="locked" class="locked" hidden>
      <div class="hero">
        <div class="sigil">ᛅ</div>
        <span class="brand"><span class="a-mark">and</span>vari</span>
        <p>the keeper of the hoard</p>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="off" autocapitalize="off" spellcheck="false" />
      </div>
      <div class="field">
        <label for="password">Master password</label>
        <input id="password" type="password" autocomplete="off" />
      </div>
      <button id="unlock" class="primary">Unlock</button>
      <div id="kdf" class="kdf" hidden>
        <div class="bar"></div>
        <div class="cap">about 6 seconds</div>
      </div>
    </section>

    <section id="unlocked" class="unlocked" hidden>
      <div class="toolbar">
        <input id="search" type="search" placeholder="Search the hoard…" autocomplete="off" spellcheck="false" />
        <button id="gen-toggle" class="ghost gen-toggle" title="Password generator">⚄</button>
      </div>
      <section id="generator" class="gen" hidden>
        <div class="section-label">New password</div>
        <div class="secret-row">
          <button id="gen-pass" class="gen-pass" title="Click to copy"></button>
          <button id="gen-again" class="ghost">Regenerate</button>
        </div>
        <span id="gen-flash" class="copy-flash" hidden>copied ✓</span>
      </section>
      <div id="site-label" class="section-label">This site</div>
      <div id="site-list" class="list"></div>
      <div class="section-label">All logins</div>
      <div id="all-list" class="list"></div>
    </section>

    <!-- Item detail: clicking a login opens its data + a link here, instead of blind-filling
         the active tab (which fails on any non-fillable page). Fill is an explicit action. -->
    <section id="detail" class="detail" hidden>
      <div class="detail-head">
        <button id="detail-back" class="ghost detail-back" title="Back to the list">‹ Back</button>
        <span id="detail-name" class="detail-name"></span>
      </div>
      <div id="detail-body" class="detail-body"></div>
    </section>

    <!-- Shared message strip: unlock errors, ping results, copy failures — both views. -->
    <div id="msg" class="msg" hidden></div>

    <footer class="pop-foot">
      <div class="foot-row">
        <button id="lock" class="ghost" hidden>Lock</button>
        <button id="open-vault" class="link">Open web vault</button>
      </div>
      <div class="foot-row">
        <button id="ping" class="link dim">Test server connection</button>
        <span id="count" class="muted" hidden></span>
      </div>
    </footer>

    <!-- external module only — the MV3 CSP forbids inline scripts -->
    <script type="module" src="popup.js"></script>
  </body>
</html>
