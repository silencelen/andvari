# Dependabot — dependency + GitHub Actions update PRs (W3 tooling, trust-attestation strategy).
# Grouped weekly to keep the noise down on a small project.
#
# ignore blocks below defer whole families to deliberate upgrade LANES
# (docs/ROADMAP.md § Dependency upgrade lanes, triage 2026-07-17). "minor/patch" is
# meaningless for these — Kotlin-ecosystem minors are toolchain generations, ktor/AGP
# minors drag a Gradle bump, lazysodium swaps the bundled native, libsodium-sumo 0.x is
# a de-facto major, and the androidx train is a pinned crash lattice. LIFT an ignore when
# its lane opens. Security *alerts* are unaffected by ignore — vulns still surface.
version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      gradle-minor-patch:
        update-types: [minor, patch]
    ignore:
      # Gradle version catalogs: Dependabot matches ignores against the catalog KEY when a
      # shared version drives several plugins (e.g. `kotlin`), and against the Maven
      # COORDINATE otherwise — so both forms are listed for every deferred family.
      # Coordinates:
      - dependency-name: "com.android*"                    # AGP — AGP9 lane (min-Gradle entangled)
      - dependency-name: "com.gradleup.shadow"             # breaks on Gradle 9 — AGP9 lane
      - dependency-name: "gradle"                          # wrapper — AGP9 lane
      - dependency-name: "org.jetbrains.kotlin*"           # Kotlin toolchain lane
      - dependency-name: "org.jetbrains.kotlinx*"
      - dependency-name: "io.ktor*"                        # klibs need Kotlin 2.2+ — toolchain lane
      - dependency-name: "org.jetbrains.compose*"
      - dependency-name: "androidx.*"                      # needs compileSdk 36 — AGP9 lane stage 3
      - dependency-name: "com.goterl*"                     # lazysodium — native crypto lane
      - dependency-name: "net.java.dev.jna*"               # jna — native crypto lane
      # Catalog keys (shared-version plugin bundles + belt-and-suspenders):
      - dependency-name: "kotlin"                          # 5 kotlin.* plugins share this ref
      - dependency-name: "coroutines"
      - dependency-name: "kotlinx-serialization"
      - dependency-name: "kotlinx-datetime"
      - dependency-name: "ktor"
      - dependency-name: "compose-multiplatform"
      - dependency-name: "compose-bom"
      - dependency-name: "lazysodium-java"
      - dependency-name: "lazysodium-android"
      - dependency-name: "jna"
      - dependency-name: "agp"
      - dependency-name: "shadow"
      - dependency-name: "activity-compose"
      - dependency-name: "androidx-fragment"
      - dependency-name: "androidx-autofill"
      - dependency-name: "lifecycle"

  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      web-minor-patch:
        update-types: [minor, patch]
    ignore:
      - dependency-name: "libsodium-wrappers-sumo"         # sodium/WASM engine — crypto lane
      - dependency-name: "@types/libsodium-wrappers-sumo"  # deprecated stub, deleted in that lane
      - dependency-name: "react"                           # React 19 atomic lane
      - dependency-name: "react-dom"
      - dependency-name: "@types/react"
      - dependency-name: "@types/react-dom"
      - dependency-name: "vite"                            # vite8 + vitest4 lane
      - dependency-name: "vitest"
      - dependency-name: "@vitejs/plugin-react"
      - dependency-name: "typescript"                      # TS7 / tsgo lane (web+ext together)
      - dependency-name: "@types/node"                     # tracks the runtime Node major (22.x)
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: "/extension"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      ext-minor-patch:
        update-types: [minor, patch]
    ignore:
      - dependency-name: "typescript"                      # TS7 / tsgo lane

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
